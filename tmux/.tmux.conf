# Use a fast, ergonomic prefix while keeping the default available.
set -g prefix C-a
bind C-a send-prefix

# Keep tmux responsive.
set -sg escape-time 10

# Use 1-based indexes for windows and panes.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Enable mouse support for pane selection, resizing, and scrollback.
set -g mouse on
bind -T prefix WheelUpPane copy-mode -e \; send-keys -X -N 5 scroll-up
bind -T prefix WheelDownPane copy-mode -e \; send-keys -X -N 5 scroll-down

# Use vi-style keys in copy mode.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Improve color handling for modern terminals.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# Split panes in the current working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Start new windows in the current working directory.
bind c new-window -c "#{pane_current_path}"
